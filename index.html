<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta Regresiva Medellín</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            
            /* --- CAMBIO AQUÍ: Ahora busca medellin.png --- */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('medellin.png');
            /* ------------------------------------------- */
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat; /* Asegura que no se repita si es pequeña */
            color: white;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 450px;
            transition: all 0.5s ease;
        }

        h1 { font-size: 1.4rem; margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; }

        .countdown-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .unit-box {
            background: rgba(255,255,255,0.95);
            color: #1a1a1a;
            padding: 15px 5px;
            border-radius: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .num { font-size: 1.8rem; font-weight: 800; display: block; line-height: 1; }
        .txt { font-size: 0.6rem; text-transform: uppercase; font-weight: bold; color: #666; margin-top: 5px; display: block; }

        /* Estilos para el mensaje final */
        #final-content { display: none; animation: fadeIn 1.5s ease-in; }
        
        .welcome-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.4);
            transition: transform 0.3s;
        }

        .welcome-btn:hover { transform: scale(1.05); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="glass-card" id="main-card">
    <div id="countdown-section">
        <h1>Faltan para vernos "Norita" en Medellín:</h1>
        <div class="countdown-wrapper">
            <div class="unit-box"><span id="d" class="num">00</span><span class="txt">Días</span></div>
            <div class="unit-box"><span id="h" class="num">00</span><span class="txt">Horas</span></div>
            <div class="unit-box"><span id="m" class="num">00</span><span class="txt">Mins</span></div>
            <div class="unit-box"><span id="s" class="num">00</span><span class="txt">Segs</span></div>
        </div>
    </div>

    <div id="final-content">
        <h1 style="font-size: 2rem; font-weight: bold;">¡LLEGÓ EL DÍA! ❤️</h1>
        <p style="margin-bottom: 20px;">Después de tantos años, la espera terminó.</p>
        <button class="welcome-btn" onclick="celebrate()">¡Bienvenido a casa!</button>
    </div>
</div>

<script>
    // --- CONFIGURA TU FECHA AQUÍ ---
    // (Año, Mes-1, Día, Hora, Minutos)
    // Ejemplo para el 24 de Diciembre de 2026 a las 6:00 PM
    const arrivalDate = new Date(2026, 2, 25, 11, 30, 0).getTime(); 

    const countdown = setInterval(() => {
        const now = new Date().getTime();
        const gap = arrivalDate - now;

        const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;

        // Asegurar que no muestre números negativos
        const d = Math.max(0, Math.floor(gap / day));
        const h = Math.max(0, Math.floor((gap % day) / hour));
        const m = Math.max(0, Math.floor((gap % hour) / minute));
        const s = Math.max(0, Math.floor((gap % minute) / second));

        document.getElementById("d").innerText = d;
        document.getElementById("h").innerText = h;
        document.getElementById("m").innerText = m;
        document.getElementById("s").innerText = s;

        // Si la cuenta regresiva termina
        if (gap <= 0) {
            clearInterval(countdown);
            document.getElementById("countdown-section").style.display = "none";
            document.getElementById("final-content").style.display = "block";
            
            // Opcional: Cambiar el fondo al terminar
            // document.body.style.backgroundImage = "url('otra_imagen.png')";
        }
    }, 1000);

    function celebrate() {
        alert("¡Medellín te recibe con los brazos abiertos! 🎉🇨🇴");
    }
</script>

</body>
</html>
